version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gokon_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gokon
      POSTGRES_PASSWORD: gokon_pass
      POSTGRES_DB: gokon_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gokon -d gokon_db']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: gokon_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://gokon:gokon_pass@postgres:5432/gokon_db
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_in_production}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      STORAGE_PATH: /app/uploads
    ports:
      - '3000:3000'
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data:
