version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gokon_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gokon
      POSTGRES_PASSWORD: gokon_pass
      POSTGRES_DB: gokon_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gokon -d gokon_db']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: gokon_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://gokon:gokon_pass@postgres:5432/gokon_db
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET must be set in environment}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET must be set in environment}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      STORAGE_PATH: /app/uploads
    ports:
      - '3000:3000'
    volumes:
      - uploads_data:/app/uploads

  mobile:
    build:
      context: ./apps/mobile
      dockerfile: Dockerfile
    container_name: gokon_mobile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # API URL that the phone/device uses to reach the backend.
      # On Docker Desktop (Windows/Mac) host.docker.internal resolves to the host machine.
      # If testing on a physical device, set HOST_IP in .env to your LAN IP (e.g. 192.168.1.x)
      EXPO_PUBLIC_API_URL: http://${HOST_IP:-host.docker.internal}:3000
      # Tells Expo which IP to embed in the QR code so the phone can reach Metro bundler
      REACT_NATIVE_PACKAGER_HOSTNAME: ${HOST_IP:-host.docker.internal}
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
    ports:
      - '8081:8081'   # Metro bundler
      - '19000:19000' # Expo Go protocol
      - '19001:19001' # Expo DevTools
    volumes:
      # Mount source so code changes are picked up without rebuilding the image
      - ./apps/mobile:/app
      - mobile_modules:/app/node_modules

volumes:
  postgres_data:
  uploads_data:
  mobile_modules:
